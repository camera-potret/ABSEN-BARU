<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Absensi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 id="kegiatan-nama">Sistem Absensi</h1>
                <p id="kegiatan-deskripsi" class="subtitle"></p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content absensi-main">
            <!-- Info Section -->
            <section class="section">
                <div class="info-card">
                    <h3>Informasi Kegiatan</h3>
                    <div class="info-content">
                        <div class="info-item">
                            <span class="info-label">Jadwal:</span>
                            <span class="info-value" id="kegiatan-jadwal">-</span>
                        </div>
                        <div id="wa-link-container" style="display: none;" class="info-item">
                            <a id="wa-link" href="#" target="_blank" class="btn btn-success">
                                💬 Bergabung Grup WA
                            </a>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Menu Tabs -->
            <section class="section">
                <div class="menu-tabs">
                    <button class="tab-btn active" onclick="switchTab('masuk')">Masuk</button>
                    <button class="tab-btn" onclick="switchTab('izin')">Izin</button>
                </div>

                <!-- Tab: Masuk -->
                <div id="masuk-tab" class="tab-content active">
                    <div class="form-section">
                        <h3>Daftar Kehadiran</h3>
                        <div class="search-container">
                            <input type="text" id="masuk-search" placeholder="Cari nama peserta...">
                            <div id="masuk-suggestions" class="suggestions-list"></div>
                        </div>

                        <div id="selected-peserta-masuk" class="selected-peserta"></div>

                        <button id="submit-masuk-btn" class="btn btn-success" style="display: none;">
                            ✅ Konfirmasi Masuk
                        </button>
                    </div>
                </div>

                <!-- Tab: Izin -->
                <div id="izin-tab" class="tab-content">
                    <div class="form-section">
                        <h3>Form Izin</h3>
                        <div class="search-container">
                            <input type="text" id="izin-search" placeholder="Cari nama peserta...">
                            <div id="izin-suggestions" class="suggestions-list"></div>
                        </div>

                        <div id="selected-peserta-izin" class="selected-peserta"></div>

                        <div id="izin-form-container" style="display: none;" class="form-group">
                            <label for="alasan-izin">Alasan Izin</label>
                            <textarea id="alasan-izin" placeholder="Jelaskan alasan tidak bisa hadir..." rows="4"></textarea>
                            <button id="submit-izin-btn" class="btn btn-success">
                                📋 Konfirmasi Izin
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Success Message -->
            <div id="success-message" class="alert alert-success" style="display: none;"></div>
        </main>
    </div>

    <script>
        const linkId = "{{ link_id }}";
    </script>
    <script src="{{ url_for('static', filename='js/absensi.js') }}"></script>
</body>
</html>
